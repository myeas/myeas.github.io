牌购买新车">3.1 老客户用老车牌购买新车</a></li><li><a href="#_3-2-新客户购买旧车使用新车牌">3.2 新客户购买旧车使用新车牌</a></li><li><a href="#_3-3-上述场景的区分">3.3 上述场景的区分</a></li></ul></li><li><a href="#_4-车牌号维护的时机-底盘号始终不动">4. 车牌号维护的时机（底盘号始终不动）</a><ul><li><a href="#_4-1-自动生成的车辆档案销售后">4.1 自动生成的车辆档案销售后</a></li><li><a href="#_4-2-外来车辆第一次进店时">4.2 外来车辆第一次进店时</a></li><li><a href="#_4-3-车辆过户后老客户用老车牌购买新车">4.3 车辆过户后老客户用老车牌购买新车</a></li><li><a href="#_4-4-车辆过户后新车主购买旧车使用新车牌">4.4 车辆过户后新车主购买旧车使用新车牌</a></li></ul></li><li><a href="#_5-车辆档案车主维护的时机-底盘号始终不动">5. 车辆档案车主维护的时机（底盘号始终不动）</a><ul><li><a href="#_5-1-自动生成的车辆档案销售后">5.1 自动生成的车辆档案销售后</a></li><li><a href="#_5-2-外来车辆第一次进店时">5.2 外来车辆第一次进店时</a></li><li><a href="#_5-3-车辆过户后老客户用老车牌购买新车">5.3 车辆过户后老客户用老车牌购买新车</a></li><li><a href="#_5-4-车辆过户后新车主购买旧车使用新车牌">5.4 车辆过户后新车主购买旧车使用新车牌</a></li></ul></li></ul></div><p></p> <p>车辆档案，是行业产品功能核心基础资料，串联起方方面面的业务，其维护的准确与否，将直接影响业务和财务。为保障业务、财务的顺畅流转，请各业务人员、财务人员务必通读本章节，掌握本章节的各项要求，确保车辆档案新增、修改、使用等均准确，避免影响业务、财务工作推进，产生不必要困扰、错误、甚至产生客户权益纠纷等。</p> <div class="custom-block warning"><p class="custom-block-title">牢记原则</p> <ul><li>非新车销售业务，必须先新增车辆档案，再在车辆档案上新增车主。</li> <li>随着车辆档案的维护，才能知道车主是选取，还是新增，还是引用。如果先新增车主，可能会导致重复的客户档案。</li> <li>同时，先新增车主，就会误把新车主与已有的正确的车辆、车主的关联关系断开，导致业务、财务混乱，甚至影响客户权益的使用。因此在车辆档案上新增车主，请务必结合下述描述准确操作。切不可不管不顾，后续再要调整回来，就很麻烦，甚至无法调整。</li></ul></div> <h2 id="_1-车辆档案的生成类型"><a href="#_1-车辆档案的生成类型" class="header-anchor">#</a> 1. 车辆档案的生成类型</h2> <p>车辆档案，根据业务特征，车辆生成类型主要区分为两大类。</p> <h3 id="_1-1-自动生成-生成新车车辆"><a href="#_1-1-自动生成-生成新车车辆" class="header-anchor">#</a> 1.1 自动生成（生成新车车辆）</h3> <p>自动生成，即这台车是由集团内某店通过整车采购业务流程，<strong>在整车采购订单审核后由系统自动生成</strong>。</p> <p>创建路径：〖整车管理〗-〖整车采购〗-〖整车采购订单〗-〖整车采购订单查询〗</p> <ul><li><p>车辆档案上的<code>车系</code>、<code>车型</code>、<code>底盘号</code>、<code>发动机号</code>、<code>颜色</code>、<code>内饰</code>、<code>选装件</code>、<code>车辆生成类型</code>、<code>车辆状态</code>等字段信息，是由整车采购流程自动生成的。</p></li> <li><p>所有人员，不允许直接在车辆档案上修改这些信息，也即，这些字段数据，以后就是固化的，不允许再改了。</p></li> <li><p>为确保这些信息准确，请各店销售经理要求本店录入整车采购订单的人员认真录入，确保正确。<strong>如不准确，应通过整车采购退订退货流程进行采购退订、采购退货，再重新进行整车采购流程予以纠正</strong>。绝对<code>不允许直接</code>修改车辆档案上相关字段。</p></li></ul> <p>自动生成的车辆档案，可用于整车采购、整车销售、整车调拨、整车库存，精品预加装等业务。</p> <p>同时，还可用于其他任何需要用到车辆档案的业务中。</p> <div class="custom-block danger"><p class="custom-block-title">特别提醒</p> <p>销售订划员在新增整车采购订单时，输入的底盘号提示重复，请按如下思路处理：</p> <ul><li>该车辆是向外部采购，还是向集团内门店调拨采购。如是集团内调拨采购，应该按整车调拨流程，不需要通过整车采购流程。</li> <li>查询《已有车辆简易信息表》（路径：〖企业建模〗-〖4S基础数据管理〗-〖公共基础资料〗-〖已有车辆简易信息表〗），输入完整的底盘号，查询到该车辆的创建组织。与该店沟通是不是可以先删除该车辆档案已发生的业务、删除该车辆档案。如能删除，待维护后整车采购订单后且审核后，该门店再重新做已删除业务（无需再新增车辆档案）。</li> <li>如果由于结账控制，导致无法删除业务单据，进而导致无法删除车辆档案，则需要把此车辆档案的底盘号修改一至两位，并在车辆说明中予以备注说明修改的原由和修改前的信息，后续该已被修改的底盘号，不得再用于任何业务。</li> <li>新车被手工创建，大多是因为新车有质损需要维修，为避免影响整车采购业务，销售计划员要及时至少完成整车采购订单审核操作，售后部再对该车辆进行维修流程。</li></ul></div> <h3 id="_1-2-手工创建-新增非新车车辆"><a href="#_1-2-手工创建-新增非新车车辆" class="header-anchor">#</a> 1.2 手工创建（新增非新车车辆）</h3> <p>手工创建，即这台车不是由集团内任一组织采购的，但需要在本店发生业务，如维修、投保等。<strong>由该组织对应的业务人员直接在〖车辆档案〗新增</strong>。</p> <p>车辆档案创建时，必须向车主获取车辆的行驶证，操作人员根据行驶证的的信息创建车辆档案，以确保车辆档案准确无误。</p> <p>创建路径：〖企业建模〗-〖4S基础数据管理〗-〖公共基础资料〗-〖车辆档案〗</p> <p>由各业务单据上【新增车辆档案】的功能，创建的车辆档案，归为本类，也为手工创建。但为更准确维护车辆档案，一般单据上的【新增车辆档案】功能权限，被关闭。</p> <p>手工创建的车辆档案可用于非整车管理系统的业务、非精品预加装的其他各项业务中。</p> <ul><li>在第一次新建该车辆档案时，务必选择准确的车型、录入正确无误的底盘号、车牌号，如能获取发动机号、颜色、内饰也请填上。</li> <li>在第一次建立后，该车辆档案上的车型、底盘号、发动机号、颜色、内饰，一般不得再行修改； 除非确实第一次新建的人员不小心选错了，又没检查到，但这种错误也仅限于和正确的只有细微的差异，才可以去直接修正。如果出现差异非常大的，那一般只有故意或根本不在意而随便录入的（这是另外一个层面的问题）。</li></ul> <div class="custom-block danger"><p class="custom-block-title">特别提醒</p> <ul><li>如果是新车，但在系统中没有该车辆信息，请务必和销售计划员沟通，并请计划员与其他同品牌店沟通，该车是不是这些店任一门店可能会采购，如果确认不会采购，可直接手工创建该车辆档案。</li> <li>如果会采购，则不允许新增该车辆，否则会导致该车辆无法进行整车采购流程。因为全系统同一底盘号只允许有一个。请让需要采购的门店的销售计划员至少完成整车采购订单操作。该门店再引用该车辆档案。</li></ul></div> <h2 id="_2-车辆档案的引用-引用已存在车辆"><a href="#_2-车辆档案的引用-引用已存在车辆" class="header-anchor">#</a> 2. 车辆档案的引用（引用已存在车辆）</h2> <p>当非新车业务的人员，如服务顾问、精品销售顾问等，在新增车辆档案时，提示【底盘号：XXXXXXXXXXXX 的车辆已存在】的信息时，则说明该车辆一定存在于系统中，已由某门店创建过该车辆档案。则此时，不得自己把正确的底盘号修改若干位，然后自行创建车辆档案。</p> <p>一定得引用车辆档案及客户档案。</p> <p>一定得引用车辆档案及客户档案。</p> <p>一定得引用车辆档案及客户档案。</p> <p>引用车辆的方法，操作比较简单：</p> <ul><li><p>在拟进行的业务单据，如维修工单、精品配件销售单、代办服务单等单据，车辆字段（工单上为底盘号字段），<code>直接输入底盘号</code>（<strong>注意不是点放大镜中找车辆，因该车辆都不在本店所以找不到</strong>），回车，则会由<code>系统自动拉取</code>该车辆信息及该车辆信息的车主至客户字段。先不要着急往下做业务。</p></li> <li><p>拉取后，在工具栏中点击【查看客户档案】，并切换到客户档案的【车辆信息】页签，选中车辆，点击【查看车辆】，在弹出的车辆档案界面中，点击【修改】，并切换到车辆档案的【售后信息】页签，在右下角所属维修中心，增加一行，再点击【保存】，则此车辆档案会被引用至本店。</p></li> <li><p>维修工单上在底盘号字段输入准确的底盘号后，回车，就可以自动带出车辆和客户，可在工具栏中点击【查看车辆档案】，就可进入到车辆档案界面，则无需再经客户档案再查看车辆档案。</p></li> <li><p>同时，不管哪种方式拉取的车辆及（或）客户，请务必到此客户。</p> <p>如果车辆已过户，实际的车主与上述被拉取的客户不相同时，请不要再修改客户档案信息，不用保存该客户档案。请参照下述《底盘号、车辆号和客户的关系》章节要求，操作相关内容。</p></li> <li><p>拉取带出的客户与实际的车主一致时，可在工具栏中点击【查看客户档案】，在弹出的客户档案界面中，点击【修改】，对右下角的客户渠道按实际选填后，保存该客户档案，则此客户档案被引用至本店。</p></li></ul> <h2 id="_3-底盘号、车牌号和客户的关系"><a href="#_3-底盘号、车牌号和客户的关系" class="header-anchor">#</a> 3. 底盘号、车牌号和客户的关系</h2> <p>现代社会，客户车辆更新换代比较快捷，原有已建立关联的底盘号、车牌号、车主，会随着车辆被出售而发生变化。</p> <p>在新增车辆档案前，可以先通过《已有车辆简易信息表》（路径：〖企业建模〗-〖4S基础数据管理〗-〖公共基础资料〗-〖已有车辆简易信息表〗），输入完整的底盘号或车牌号，查询下拟新增的车辆档案是否在系统中已存在。</p> <p>如果底盘号和车牌号都不存在，且不是新增销售业务用的新车，则可以直接新增车辆档案。</p> <p>如果底盘号<strong>或</strong>车牌号在系统中存在，就需要结合如下场景，分别做不同的操作。</p> <p>发生变化时，主要有如下两种场景。</p> <h3 id="_3-1-老客户用老车牌购买新车"><a href="#_3-1-老客户用老车牌购买新车" class="header-anchor">#</a> 3.1 老客户用老车牌购买新车</h3> <p>任何时候，客户来店发生业务时，都应该对系统中的底盘号、车牌号、客户，与实际的行驶证进行核对。确保要进行的业务，涉及的底盘号、车牌号、客户之间的关联关系是准确无误的。否则将导致业务混乱、财务混乱，甚至客户权益使用混乱，及可能导致不必要的纠纷。请务必核对。除非，操作人员确认可以判断系统中的信息与实际是相符的，则可以不看行驶证。</p> <p>当老客户保留老车牌，在本店购买新车，新车上牌时用老车牌；或在他店购买新车使用老车牌后，来本店发生业务。</p> <p>在车辆档案上，维护车牌号时，会提示车牌号已存在，此时不得随意把车牌号修改若干位，然后就这样维护进去。既然提示了，那说明一定存在该车牌号的车辆。请参照如下操作：</p> <ul><li>请服务顾问协助，新增维修工单（一定不要保存或提交维修工单，因为旧车不发生业务），在工单上的<code>车牌号</code>字段（上面3.2为底盘号，请注意），直接输入完整的车牌号，回车，则系统会自动拉取该车牌号对应的原车辆。</li> <li>点击工具栏中的【查看车辆档案】，进入到车辆档案界面，把里面的<code>车牌号清空、车牌颜色选为空</code>；切换到【客户信息】页签，把<code>车主清空</code>（车辆过户了肯定车主就不是原车主了），对车辆档案进行【保存】。这样，就把原底盘号与原车牌号、原车主这三者之间的关系断开了，原旧车暂时就没有了车牌号、客户，原车牌号就可以维护在新车上。</li> <li>重新新增老客户购买的新的车辆档案维护老车牌号、或在已新增的老客户新的车辆档案上增加老车牌号，继续完善车辆档案上的其他信息，在【客户信息】页签<strong>选择已有</strong>的老客户，并保存车辆档案。</li> <li>如上新增的维修工单，仅是为了便于操作原车辆档案，并不需要继续往来继续做下去，请及时关闭即可，切不可保存维修工单。待老客户老车牌及新车的关联关系维护准确后，才可以重新新增维修工单做维修业务，或做其他业务。</li></ul> <p>这样就完成了，老客户老车牌与原底盘号的关联关系的断开，并建立起老客户老车牌与新车辆的关联关系。</p> <h3 id="_3-2-新客户购买旧车使用新车牌"><a href="#_3-2-新客户购买旧车使用新车牌" class="header-anchor">#</a> 3.2 新客户购买旧车使用新车牌</h3> <p>任何时候，客户来店发生业务时，都应该对系统中的底盘号、车牌号、客户，与实际的行驶证进行核对。确保要进行的业务，涉及的底盘号、车牌号、客户之间的关联关系是准确无误的。否则将导致业务混乱、财务混乱，甚至客户权益使用混乱，及可能导致不必要的纠纷。请务必核对。除非，操作人员确认可以判断系统中的信息与实际是相符的，则可以不看行驶证。</p> <p>当旧车销售给第三方新客户时，旧车来店发生业务时。当输入底盘号后，带出的车牌信息、客户信息，与现在的信息不一致时，请务必与客户核对信息，一般是旧车过户了。请参照如下操作：</p> <ul><li>请服务顾问协助，新增维修工单（一定不要保存或提交维修工单，因为信息不准确），在工单上的<code>底盘号</code>字段（上面3.1为车牌号，请注意），直接输入完整的底盘号，回车，则系统会自动拉取该底盘号的车辆。</li> <li>点击工具栏中的【查看车辆档案】，进入到车辆档案界面，把里面的<code>车牌号、车牌颜色修改为准确的新信息</code>；切换到【客户信息】页签，点击【新增车主】，按客户档案的维护要求新增客户档案（<a href="/pages/basedata-200010/">客户档案及客户的维护要求</a>），新增完客户档案后，回到车辆档案界面，对车辆档案进行【保存】。这样，就把底盘号与原车牌号、原车主这三者之间的关系断开了，并对旧车维护了新车牌、新车主。</li> <li>如上新增的维修工单，仅是为了便于操作原车辆档案，并不需要继续往来继续做下去，请及时关闭即可，切不可保存维修工单。待旧车与新车牌、新车主的关联关系维护准确后，才可以重新增维修工单做维修业务，或做其他业务。</li></ul> <h3 id="_3-3-上述场景的区分"><a href="#_3-3-上述场景的区分" class="header-anchor">#</a> 3.3 上述场景的区分</h3> <p>上述两种场景，是以进厂的是旧车牌新车，还是旧车新车牌，来指导具体如何操作的。</p> <ul><li><p>旧车牌新车，则需要先对旧车上的信息清空，因为不知旧车卖给谁了。再新增新车与旧车牌、旧车主关联。</p> <p>同时，旧车牌新车，不需要新增客户档案，因为车主是老车主，已在系统中存在。当然如果是别店的，则需要引用客户档案。</p></li> <li><p>旧车新车牌，则已知旧车是过户给谁了（因为已来店），所以可以直接在旧车上修改车牌、车牌颜色、新增车主。旧车与新车牌、新车主关联。</p></li> <li><p>同时，旧车新车牌，一般来说，这个车主是新车主，需要新增。当然也不排除老车主购买了其他车主的旧车，如是此，则同样不需要新车车主，而是引用客户档案。</p></li></ul> <div class="custom-block danger"><p class="custom-block-title">提醒</p> <ul><li>不管上述哪种场景，是以车为核心判断依据，也即车辆档案上底盘号，在该车辆档案最初创建那一刻起，该底盘号就与该编码的车辆档案建立了永久的关联关系。不因过户等场景，底盘号发生任何变化。就像实车过户后，实车铭牌上的底盘号并不会因过户而发生任何变化。</li> <li>只要抓住这个本质，那我们就能知晓什么场景该如何操作了，而不是胡乱的操作。甚至把底盘号修改掉，这是非常严重的错误操作。</li></ul></div> <h2 id="_4-车牌号维护的时机-底盘号始终不动"><a href="#_4-车牌号维护的时机-底盘号始终不动" class="header-anchor">#</a> 4. 车牌号维护的时机（底盘号始终不动）</h2> <p>任何时候，客户来店发生业务时，都应该对系统中的底盘号、车牌号、客户，与实际的行驶证进行核对。确保要进行的业务，涉及的底盘号、车牌号、客户之间的关联关系是准确无误的。否则将导致业务混乱、财务混乱，甚至客户权益使用混乱，及可能导致不必要的纠纷。请务必核对。除非，操作人员确认可以判断系统中的信息与实际是相符的，则可以不看行驶证。</p> <h3 id="_4-1-自动生成的车辆档案销售后"><a href="#_4-1-自动生成的车辆档案销售后" class="header-anchor">#</a> 4.1 自动生成的车辆档案销售后</h3> <p>用于销售业务中的车辆档案，在后续代办上牌、后续业务跟进、进厂维修、投保、购买精品等业务场景下一般可以获取到车牌号，在获取后及时填列准确的车牌号和车牌颜色。</p> <h3 id="_4-2-外来车辆第一次进店时"><a href="#_4-2-外来车辆第一次进店时" class="header-anchor">#</a> 4.2 外来车辆第一次进店时</h3> <p>外来车辆第一次来店时，新增车辆档案时，一定要要求客户提供行驶证、驾驶证，以确保在系统中维护的信息与实际一致。</p> <h3 id="_4-3-车辆过户后老客户用老车牌购买新车"><a href="#_4-3-车辆过户后老客户用老车牌购买新车" class="header-anchor">#</a> 4.3 车辆过户后老客户用老车牌购买新车</h3> <p>参照上述&lt;3.1老客户用老车牌购买新车&gt;，清空旧车上的车牌号、车牌颜色、清空车主。</p> <p>再新增新车的信息，在系统中录入为一个新的车辆档案，并填上老车牌、选择准确的车牌颜色，并在车辆档案上新增车主。</p> <h3 id="_4-4-车辆过户后新车主购买旧车使用新车牌"><a href="#_4-4-车辆过户后新车主购买旧车使用新车牌" class="header-anchor">#</a> 4.4 车辆过户后新车主购买旧车使用新车牌</h3> <p>这个场景，服务顾问往往会忽略，还在继续着旧车、旧车牌、旧车主的关联，直接做业务。这是非常严重的问题，导致业务、财务混乱。请认真对待！！！</p> <p>也正是因为这点，我们反复强调，每次发生业务时，请相关人员务必核对当前带出的车辆、车牌、车主，与线下实际信息是不是一致，如不一致，不要仓促操作业务。请务必按照规范要求对旧车上的车牌号、车牌颜色、车主信息做更新，再继续业务。</p> <p>请参照上述&lt;3.2 新客户购买旧车使用新车牌&gt;，更新旧车上的车牌号、车牌颜色、车主。</p> <hr> <div class="custom-block danger"><p class="custom-block-title">再三强调</p> <ul><li>绝对禁止修改自动生成的车辆档案上的车型、底盘号、颜色、内饰等信息。原则上禁止修改手工创建的车辆档案上的车型、底盘号。</li> <li>绝对禁止修改自动生成的车辆档案上的车型、底盘号、颜色、内饰等信息。原则上禁止修改手工创建的车辆档案上的车型、底盘号。</li> <li>绝对禁止修改自动生成的车辆档案上的车型、底盘号、颜色、内饰等信息。原则上禁止修改手工创建的车辆档案上的车型、底盘号。</li></ul></div> <h2 id="_5-车辆档案车主维护的时机-底盘号始终不动"><a href="#_5-车辆档案车主维护的时机-底盘号始终不动" class="header-anchor">#</a> 5. 车辆档案车主维护的时机（底盘号始终不动）</h2> <p>任何时候，客户来店发生业务时，都应该对系统中的底盘号、车牌号、客户，与实际的行驶证进行核对。确保要进行的业务，涉及的底盘号、车牌号、客户之间的关联关系是准确无误的。否则将导致业务混乱、财务混乱，甚至客户权益使用混乱，及可能导致不必要的纠纷。请务必核对。除非，操作人员确认可以判断系统中的信息与实际是相符的，则可以不看行驶证。</p> <p>任何客户档案的维护，必须按照《客户档案与客户的维护要求》来维护。</p> <p>请参见：<a href="/pages/basedata-200010/">客户档案及客户的维护要求</a></p> <h3 id="_5-1-自动生成的车辆档案销售后"><a href="#_5-1-自动生成的车辆档案销售后" class="header-anchor">#</a> 5.1 自动生成的车辆档案销售后</h3> <p>用于销售业务中的车辆档案，在销售环节已确认车主，不需要重新维护。除非该车辆后续卖给第三方后。</p> <h3 id="_5-2-外来车辆第一次进店时"><a href="#_5-2-外来车辆第一次进店时" class="header-anchor">#</a> 5.2 外来车辆第一次进店时</h3> <p>外来车辆第一次来店时，新增车辆档案时，一定要要求客户提供行驶证、驾驶证，以确保在系统中维护的信息与实际一致。在车辆档案的【客户信息】页签，【新增车主】。</p> <h3 id="_5-3-车辆过户后老客户用老车牌购买新车"><a href="#_5-3-车辆过户后老客户用老车牌购买新车" class="header-anchor">#</a> 5.3 车辆过户后老客户用老车牌购买新车</h3> <p>参照上述&lt;3.1老客户用老车牌购买新车&gt;，清空旧车上的车牌号、车牌颜色、清空车主。</p> <p>再新增新车的信息，在系统中录入为一个新的车辆档案，在车辆档案的【客户信息】页签，车主字段<strong>选择老客户</strong>。</p> <p>注意：此时不是新增车主，因为客户已存在于系统中，如果再录入，就会导致重复的客户档案，导致业务混乱、财务混乱。</p> <h3 id="_5-4-车辆过户后新车主购买旧车使用新车牌"><a href="#_5-4-车辆过户后新车主购买旧车使用新车牌" class="header-anchor">#</a> 5.4 车辆过户后新车主购买旧车使用新车牌</h3> <p>这个场景，服务顾问往往会忽略，还在继续着旧车、旧车牌、旧车主的关联，直接做业务。这是非常严重的问题，导致业务、财务混乱。请认真对待！！！</p> <p>也正是因为这点，我们反复强调，每次发生业务时，请相关人员务必核对当前带出的车辆、车牌、车主，与线下实际信息是不是一致，如不一致，不要仓促操作业务。请务必按照规范要求对旧车上的车牌号、车牌颜色、车主信息做更新，再继续业务。</p> <p>请参照上述&lt;3.2 新客户购买旧车使用新车牌&gt;，更新旧车上的车牌号、车牌颜色、车主。</p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E8%BD%A6%E8%BE%86%E6%A1%A3%E6%A1%88" title="标签">#车辆档案</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/05/25, 09:09:18</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/basedata-200011/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">供应商</div></a> <a href="/pages/basedata-200013/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">车系车型（待补）</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
