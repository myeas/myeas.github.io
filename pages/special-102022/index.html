href="#_1-主要内容概述-以下内容还要完善中-不能完全依赖" class="header-anchor">#</a> 1. 主要内容概述（以下内容还要完善中，不能完全依赖）</h2> <p>为便于更好的使用应收系统各功能，推进与财务处理相关流程、操作的规范，促进制单、审核、财务记账、对账、结算等规范应用，提高工作效率，减少差错，本文统筹描述相关内容。</p> <h3 id="_1-1-主要内容"><a href="#_1-1-主要内容" class="header-anchor">#</a> 1.1 主要内容</h3> <p>主要阐述预收账款、应收账款、合同负债在系统中的业务发生和财务处理的基本逻辑、对账要求、管理报表、异常操作、常见问题、超期应收管理等内容。</p> <h3 id="_1-2-主要单据"><a href="#_1-2-主要单据" class="header-anchor">#</a> 1.2 主要单据</h3> <p>应收系统主要包括三种单据类型，分别为：</p> <ul><li><strong>应收单</strong>：核心作用是与往来户确认债权关系，即谁欠我们的钱，并辅以确认对应的收入、税金。</li> <li><strong>收款单</strong>：收到（或视同收到）往来户的款项时，通过收款单予以记录。</li> <li><strong>结算记录</strong>：确认往来账款的相互勾稽匹配关系，相同往来户为结算、不同往来户为转销。
<ul><li><code>销售回款结算</code>/<code>销售回款转销</code>：即收取的款项（收款单）与已有债权（应收单）勾稽匹配后相互抵消；（最常见）</li> <li>应收冲应付结算/应收冲应付转销：债权（你欠我的，应收单）与债务（我欠你的，应付单）的勾稽匹配后相互抵消；（考虑到业务特点，不使用）</li> <li><code>预收冲预付结算</code>/<code>预收冲预付转销</code>：代收/预收的款项（收款单）与代付/预付的款项（付款单）的勾稽匹配后相互抵消；（所有收款与付款的结算处理）</li> <li>收款冲付款结算/收款冲付款转销：代收/预收的款项（收款单）与代付/预付的款项（付款单）的勾稽匹配后相互抵消；（不再使用，请使用预收冲预付）</li></ul></li></ul> <h3 id="_1-3-主要科目"><a href="#_1-3-主要科目" class="header-anchor">#</a> 1.3 主要科目</h3> <p>但凡使用应收单、收款单进行业务承载，体现往来账款的业务发生，不管其对应的具体科目是什么，实际上在系统中的操作流程、操作要求、操作规范是类似的，甚至是一样的。结合实际管理，本系统定义的往来科目较宽泛，不再区限于传统的六大往来科目，应收系统包含的科目主要有：</p> <div class="custom-block note"><p class="custom-block-title">应收系统主要往来科目</p> <ul><li>所有<code>预收账款</code>明细科目；</li> <li>所有<code>应收账款</code>明细科目，为简化操作，不直接使用此科目；</li> <li><strong>视同</strong>应收预收管理的明细科目，特指增值代办业务的应收和收款要使用到的往来科目，如其他应收款；</li> <li>所有<code>合同负债</code>明细科目，但<strong>不包含</strong><code>合同负债-预存款开票</code>，<code>合同负债-待转销项税额</code>；虽然在国家财税制度和规范上，合同负债与预收账款是有区别的，但结合实际业务操作，从系统应用层面，这两者几乎没有区别。</li></ul></div> <div class="custom-block tip"><p class="custom-block-title">应付系统主要往来科目</p> <p>顺带提下，结合实际管理，应付系统涉及的主要往来科目，主要有：</p> <ul><li>所有预付账款明细科目；</li> <li>所有应付账款明细科目，为简化操作，不直接使用此科目；全部以预付账款作为承载；</li> <li>不包含：预收账款、应收账款、其他应收款、其他应付款、合同负债。</li></ul></div> <div class="custom-block danger"><p class="custom-block-title">特别提醒</p> <ul><li>为简便操作，系统中不直接使用<code>应收账款</code>科目，<code>应收账款</code>和<code>预收账款</code>的<strong>所有</strong>业务和财务处理，均只以<code>预收账款</code>做为承载，仅在财务报表中重分类时，<code>预收账款的借方余额</code>，重分类至应收账款。也即日常操作中，应收账款  =  预收账款。</li> <li>合同负债，自2020年1月起，日常业务发生过程中，视同代替原来的<code>预收账款</code>，原来的<code>预收账款</code>使用范围收窄。只有期末时，按本部资产财务部的要求，提取税额并转出。</li> <li>合同负债、预收账款的具体使用规范，请遵循本部资产财务部的要求。</li></ul></div> <h3 id="_1-4-记账要素与收款类型、费用项目的对应关系"><a href="#_1-4-记账要素与收款类型、费用项目的对应关系" class="header-anchor">#</a> 1.4 记账要素与收款类型、费用项目的对应关系</h3> <details class="custom-block details"><summary>科目、记账要素（记账分类）、收款类型（收款单）、费用项目（应收单）的对应关系【暂未更新，待更新】</summary> <table><tr><th>记账要素</th> <th>参考科目</th> <th>收款单（贷方）<br>收款类型及行备注</th> <th>应收单（借方）<br>物料/费用项目</th></tr> <tr><th colspan="4">整车销售业务</th></tr> <tr><td>往来：客户2003 预收账款/合同负债（整车）</td> <td>2204.02 合同负债-整车</td> <td>整车销售收款<br>整车销售退款</td> <td>车型关联的物料</td></tr> <tr><td>收入：</td> <td></td> <td></td> <td></td></tr> <tr><th colspan="4">精品销售业务</th></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr> <tr><td></td> <td></td> <td></td> <td></td></tr></table></details> <h2 id="_2-业务发生的基本逻辑"><a href="#_2-业务发生的基本逻辑" class="header-anchor">#</a> 2. 业务发生的基本逻辑</h2> <p>根据集团管理要求及业务，分别设置了预收账款、应收账款、合同负债、其他应收款等。</p> <h3 id="_2-1-科目设置列表"><a href="#_2-1-科目设置列表" class="header-anchor">#</a> 2.1 科目设置列表</h3> <table><tr><th width="100px;">科目编码</th> <th width="280px;">科目名称</th> <th>核算说明</th></tr> <tr><th colspan="3">应收账款（不直接使用）--受控科目，禁止手工凭证</th></tr> <tr><td>1122</td> <td>应收账款</td> <td>一级科目，不具体发生业务</td></tr> <tr><td>1122.XX<br>1122.XX.XX</td> <td>应收账款_具体明细科目名称</td> <td>所有末级明细科目（所有非末级明细科目，同样不参与具体发生）</td></tr> <tr><th colspan="3">预收账款--受控科目，禁止手工凭证</th></tr> <tr><td>2203</td> <td>预收账款</td> <td>一级科目，不具体发生业务</td></tr> <tr><td>2203.XX<br>2203.XX.XX</td> <td>预收账款_具体明细科目名称</td> <td>所有末级明细科目</td></tr> <tr><th colspan="3">合同负债--2204.02至2204.05为受控科目，禁止手工凭证</th></tr> <tr><td>2204</td> <td>合同负债</td> <td>一级科目，不具体发生业务</td></tr> <tr><td>2204.01</td> <td>合同负债_预存款开票（特殊科目）</td> <td>严格意义上，其不为往来科目，但在一定程度上转换成含税金额后，可参与数据核对</td></tr> <tr><td>2204.02</td> <td>合同负债_整车</td> <td>核算整车销售业务</td></tr> <tr><td>2204.03</td> <td>合同负债_精品配件</td> <td>核算精品配件销售业务</td></tr> <tr><td>2204.04</td> <td>合同负债_维修</td> <td>核算维修业务</td></tr> <tr><td>2204.05</td> <td>合同负债_其它</td> <td>核算非整车销售、非精品配件销售、非维修、非代办的业务，如保险返点、按揭返点等</td></tr> <tr><td>2204.06</td> <td>合同负债_待转销项税额（特殊科目）</td> <td>日常不发生业务，仅在期末按2204.02至2204.05的当期期末余额按税率提取税额，并进行结转。次月初，再转回上月末这笔金额。如此按月提取结转冲回。</td></tr> <tr><th colspan="3">其他应收款--虽然不受控，但因为只用于代办业务，也不应有手工凭证</th></tr> <tr><td>1221</td> <td>其他应收款</td> <td>一级科目，不具体发生业务</td></tr> <tr><td>1221.XX</td> <td>其他应付款_具体明细科目名称（视同受控）</td> <td>用于代办业务的往来科目，具体用哪个科目以本部资产财务部要求为准，同时提醒，这些科目一般也不用于手工凭证。</td></tr> <tr><th colspan="3">其他应收款--非代办业务使用的其他应收款，不受控不加入对账科目，一般用于手工凭证</th></tr> <tr><td>1221.XX</td> <td>其他应付款_其他各具体明细科目名称（不受控）</td> <td>非代办业务的其他应收款，一般用于手工凭证。</td></tr></table> <div class="custom-block tip"><p class="custom-block-title">提示</p> <ul><li>上述科目，<strong>在发生第一笔单据和凭证前</strong>，必须在应收管理模块（路径：<code>〖财务会计〗-〖应收管理〗-〖初始化〗-〖对账科目设置〗</code>），加入对账科目，如自行不能添加，请联系本部添加！！！</li> <li>加入对账科目后，只要有一笔单据或凭证发生后，则不得在对账科目设置中删除该对账科目，即使该科目以后不再使用！！！</li> <li>上述科目，不得在手工凭证使用。</li> <li>除债权转移的凭证、结算记录的凭证，其他各种的应收单、收款单、应付单、付款单，不得在借贷同时有受控科目或视同受控科目。</li> <li>即使是债权转移的凭证、结算记录的凭证，也有其规范，借或贷的科目不是随意选取使用的。</li></ul></div> <div class="custom-block warning"><p class="custom-block-title">提醒</p> <ul><li><strong>由于自2020年1月起，绝大部分预收账款业务转由合同负债承担，为简化后续描述，下述说到<code>对账科目（统称）</code>的地方，包含<code>合同负债四个科目</code>外，还同时包含<code>预收账款</code>、<code>应收账款</code>、<code>参照同样管理的代办业务的其他应收款</code></strong>。不再赘述。</li> <li>在描述提取税额时，合同负债仅包含2204.02-2204.05四个科目，不包含预收账款、应收账款、参照管理的其他应收款。</li> <li>同时说到合同负债的时候，也不包含合同负债-预存款开票、合同负债-待转销项税额。这两个科目要么简称为<code>预存款开票科目</code>、<code>待转销项税额科目</code>，要么描述时以全称，以示区别。</li></ul></div> <h3 id="_2-2-业务发生的登记过程-前台-收款单-对账科目-统称-科目在贷方"><a href="#_2-2-业务发生的登记过程-前台-收款单-对账科目-统称-科目在贷方" class="header-anchor">#</a> 2.2 业务发生的登记过程-（前台）收款单（对账科目（统称）科目在贷方）</h3> <p>对账科目（统称）各明细科目，为受控科目。禁止编制手工凭证登记业务的发生。</p> <p><strong>1.企业因销售商品、产品、提供劳务等业务，向购买单位收取的款项，贷记<code>对账科目(统称)</code>科目。</strong></p> <ul><li><p><strong>需要收取的款项（不管是预收还是回款），在系统中，以<code>（前台）收款单</code>作为承载，以<code>收款类型</code>区分业务大类。</strong> 同时注意，已付供应商的后续要供应商退还的，在系统中不以收款单为承载，应当以付款单负数承载。</p></li> <li><p>收款单的收款类型已预设，并结合收款单上的备注，与业务一一对应；同时为匹配正负，分别设置了收款和退款。如403整车销售收款、404整车销售退款，405精品销售收款、406精品销售退款，409维修收款、410维修退款等等。也即当单据上的应收金额是正数，则应是收款类型，当应收金额是负数，则应是退款类型。</p></li> <li><p>收款类型与收款单行备注，决定了该行收款，在记账时，其记账要素是什么。</p></li> <li><p>收款单的收款科目，一般为现金类科目。特定场景下，可能为主营成本-整车返利（如整车贷款贴息，金融机构回款是先扣除，后续厂家补贴）、营业外收入（超过一定年限的客户预收款转为营业外收入）。</p></li> <li><p>收款单的收款科目，在特定场景，可能为过渡科目，如索赔的回款，不直接回，而是转做预付厂家的款项。虽然系统支持应收转预付的功能，但因考虑到单据上的反写等，我们不使用此功能。当确认这笔款项时，业务单据生成（前台）收款单，收款科目中过渡科目，同时马上做一笔付款单，付款单的付款科目用同一过渡科目。这样实现应收转预付的功能。此过渡科目，一般建议使用其他应收款，但非代办业务中用到的科目。</p></li></ul> <p><strong>2.如有退款，则做（前台）收款单的负数，而非付款单。</strong></p> <p><strong>3.（前台）收款单，一般应由上游业务单据关联生成，即核心单据类型（源单类型）不为空</strong>，如为空（除特定业务由应收单生成收款单），则为手工（前台）收款单。手工（前台）收款单，如与已上线业务模块无关可手工，如有关则是错误的单据。</p> <p><strong><code>手工收款单，将导致与对应业务单据无关联，无法反写对应业务单据，随即导致单据未收款出现异常</code></strong>。</p> <p><strong><code>手工收款单，特别是与客户权益相关的，如预收款账户的收退款、会员充值的收退款等，正数的手工收款，收了但无法被业务单据上使用；负数的手工退款，则业务账户上并没有减少，可能会导致再次使用产生损失的风险</code></strong>。</p> <details class="custom-block details"><summary>常见收退款业务与核心单据类型的匹配关系</summary> <p>有核心单据类型（源单类型） 的主要场景有：</p> <ul><li>整车销售订单的收退款，核心单据类型（源单类型）为<code>整车销售订单</code>，如收款与此相关且为手工单据则为错误；</li> <li>整车调拨的收退款，核心单据类型（源单类型）为<code>整车调拨单</code>，如收款与此相关且为手工单据则为错误；</li> <li>二手车销售的收退款，核心单据类型（源单类型）为<code>二手车销售单</code>，如收款与此相关且为手工单据则为错误；</li> <li>精品配件销售单的收退款，核心单据类型（源单类型）为<code>精品配件销售单</code>，如收款与此相关且为手工单据则为错误；</li> <li>代办服务单的收退款，核心单据类型（源单类型）为<code>代办服务单</code>，如收款与此相关且为手工单据则为错误；</li> <li>维修业务的收退款，核心单据类型（源单类型）为<code>维修结算单</code>，如收款与此相关且为手工单据则为错误；</li> <li>预收款账户的收退款，核心单据类型（源单类型）为<code>预收款单</code>，如收款与此相关且为手工单据则为错误；</li> <li>会员套餐销售的收款，核心单据类型（源单类型）为<code>套餐销售单</code>，如收款与此相关且为手工单据则为错误；</li> <li>会员充值的收款，核心单据类型（源单类型）为<code>会员卡充值</code>，如收款与此相关且为手工单据则为错误；</li> <li>会员充值的退款，核心单据类型（源单类型）为<code>会员卡退款</code>，如收款与此相关且为手工单据则为错误；</li> <li>会员套餐调整的收退款，核心单据类型（源单类型）为<code>套餐调整单</code>，如收款与此相关且为手工单据则为错误；</li> <li>会员套餐变更的收退款，核心单据类型（源单类型）为<code>套餐变更单</code>，如收款与此相关且为手工单据则为错误；</li> <li>延保销售的收退款，核心单据类型（源单类型）为<code>延保销售单</code>，如收款与此相关且为手工单据则为错误；如延保销售是通过代办服务单收款，则为代办服务单；</li> <li>商业产品的收退款，核心单据类型（源单类型）为<code>商业产品销售单</code>，如收款与此相关且为手工单据则为错误；</li> <li>保险返利的收退款，核心单据类型（源单类型）为<code>车辆保险登记单</code>，如收款与此相关且为手工单据则为错误；</li> <li>按揭返利的收退款，核心单据类型（源单类型）为<code>车辆按揭返利单</code>，如收款与此相关且为手工单据则为错误；</li></ul> <p>无核心单据类型（源单类型）的主要场景有：</p> <ul><li><p>整车返利（特指由我方向厂家开具发票的业务）的回款，由整车返利的应收单生成，核心单据类型为空；</p> <p>由厂家给我们开红字发票的，为应付系统业务。</p></li> <li><p>早期的保险返利的回款，由保险返利的应收单生成，核心单据类型为空；</p></li> <li><p>早期的按揭返利的回款，由按揭返利的应收单生成，核心单据类型为空；</p></li></ul></details> <p>从您看到此点时，请严格自我要求：</p> <div class="custom-block danger"><p class="custom-block-title">⚠️不得再发生新业务的手工收款或退款⚠️</p> <ul><li><p>与业务相关的收退款，必须由业务单据关联生成，不得直接在（前台）收款单，直接点【新增】按钮新增产生。</p> <p>特殊例外，预收款账户的收款，需要从前台收款单上点新增且【收预收】，但实际上其也视同关联生成，因为其会自动生成上游单据<code>预收款单</code>；</p> <p>特殊例外，前台收款单的收款或退款，通过<code>选择未收款单据</code>功能拉取后生成的前台收款单，其实际上也是生成只不过是拉式生成，源单类型（核心单据类型）一样不为空。</p></li> <li><p>新发生的手工收款或退款，除与已上线模块业务无关的之外，其他与业务有关联的手工收款或退款，不得再有发生，除非调整历史已发生的错误。</p></li></ul></div> <p><strong>4.不管正负收款单，其生成凭证时的格式参考。</strong></p> <ul><li>一般收款单的凭证取值参考</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p><strong>借</strong>：收款单上的收款科目及辅助，一般为现金类科目</p> <p><strong>贷</strong>：记账分类（客户/供应商）中与收款类型及行备注组合后匹配的记账要素关联的科目，如记账要素<code>2003 预收账款/合同负债（整车）</code>，关联科目时，则应关联<code>2204.02 合同负债-整车</code></p></div> <ul><li>另：手工正负收款单，调整对账科目（统称）及辅助</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p><strong>贷</strong>：分录对方科目</p> <p><strong>贷</strong>：分录对方科目</p></div> <ul><li>特殊业务：预存款开票。收款单的收款类型为<code>499 预存款开票</code>或<code>498 退预存款开票</code>。其凭证也比较特殊：</li></ul> <div class="custom-block tip"><p class="custom-block-title">📌凭证参考📌</p> <p><strong>借</strong>：收款单上的收款科目及辅助，一般为现金类科目</p> <p><strong>贷</strong>：记账要素<code>2911 预存款开票合同负债</code>关联的科目</p> <p>贷：销项税科目</p> <br> <p>早期预存款开票的凭证参考：</p> <p>借：收款单上的收款科目及辅助</p> <p>贷：暂估收入科目</p> <p>贷：销项税科目</p> <p>借：暂估成本科目</p> <p>贷：暂估存货科目</p></div> <div class="custom-block danger"><p class="custom-block-title">⚠️特别提醒⚠️（请熟记如下提醒）</p> <ul><li><p>收款单上的收款科目，不得为任一应收系统的对账科目、不得为任一应付系统的对账科目。</p></li> <li><p>当收款科目一般为现金类科目。</p></li> <li><p>当收款科目选择非现金类科目，其科目的选择不得超过特定场景。</p></li> <li><p>当收款科目选择过渡科目时，内部转移类的业务（如索赔应收转配件预付）应当同步有对应的其他单据（比如付款单）。</p></li> <li><p>当收款科目选择过渡科目时，外部转移类的业务（如原A店的客户到B店使用权益），收到款项时或抵消过渡科目时，一般以手工凭证收回或抵消，不得再做收款单。否则将导致重复的收款单，无法被结算。</p></li> <li><p>收款类的凭证，其贷方科目（预存款开票除外）非对账科目时，一般不做收款单，而是直接做手工凭证。</p> <p>顺带提下，付款类的凭证，其借方科目非对账科目时，一般不做付款单，而是直接做手工凭证。</p></li></ul></div> <p><strong>5.收款单上的往来类型为一般为<code>客户</code></strong>。仅当上游业务为索赔维修时，则往来户类型为<code>供应商</code>。</p> <p><strong>6.为简便操作，系统中不直接使用<code>应收账款</code>科目，仅在财务报表中重分类时，<code>预收账款/合同负债的借方余额</code>，重分类至应收账款。</strong></p> <p><strong>7.收款单上以<code>已结算金额</code>、<code>未结算金额</code>标记收款单的结算结果。</strong></p> <p>已结算金额，表示该收款单与对应的发票（应收单）、对应的代付（付款单）进行了结算处理，或正负收款单进行结算处理等。</p> <p>未结算金额，表示该收款单收款后，还没有对应的业务与之结算。（请重点理解这句的含义！！！）</p> <div class="custom-block warning"><p class="custom-block-title">⁉️结算处理的注意事项⤵️</p> <ul><li>切不可乱结算，即禁止彼此不是匹配对应关系的单据进行结算处理。如果结算错误，可能会导致凭证出错、未结算数据出错、无法结算等问题，如后续才发现，就需要反结账反结算，甚至在某些场景下不允许反结算。</li> <li>常见乱结算的有：整车预收和精品配件应收结算、整车预收和代办应收结算、整车应收或精品配件应收与代办收款进行结算。</li> <li>在实际业务中，结算处理时，<code>一般应往来户一致</code>，如果出现非规范说明中的不一致场景，则一般是操作错误。</li> <li>在实际业务中，结算处理时，<code>往来户不一致的场景</code>，主要有：
<ul><li>整车预收与整车最终开票不是同一往来户，可不同往来户结算，为销售回款转销，结算记录需要生成凭证。</li> <li>代办业务中，代办收款（代收的客户款项），与代办付款（为客户办理业务支付的款项），可不同往来户结算，为预收冲预付转销，结算记录需要生成凭证。</li> <li>客户置换二手车时，二手车销售的回款其中抵新车的部分，与整车应收结算，可不同往来户结算，为销售回款转销，结算记录需要生成凭证。</li> <li>客户置换二手车时，二手车销售的回款其中直接支付给客户的部分，与二手车收购的付款单结算，可不同往来户结算，为预收冲预付转销，结算记录需要生成凭证。</li> <li>其他场景，如出现往来户不一致，则一般是错误的操作。要么乱结算，要么单据上改了往来户，要么客户档案改了关联的财务客户。除有遗漏场景，则补充在此点之前。</li></ul></li> <li>对账科目（统称）的余额，<strong>一般应当等于同一往来户的应收单的未结算金额减去收款单的未结算金额，大于0则为应收余额一般在借方，小于0则为预收余额一般在贷方</strong>。且一般要么只有应收单有未结算金额，要么只有收款单有未结算金额。除非该往来户的业务还在进行中，如同一客户存在精品的预收款还未开票、整车贷方已开票但还未回款等类似场景。</li></ul></div> <p><strong>8.前台收款单实际上不真正生成凭证</strong>。因标准收款单（即应收系统的收款单）的功能不足，行业产品全新构造了前台收款单，衔接业务单据与收款单，以便支持行业特点，如预收款账户、会员类金额消费确认、优惠券消费确认等，同时支持同一业务多笔结算方式。</p> <p>前台收款单，当结算方式栏的实收金额不为0时，即本次收退款，需要实实在在收款或退款，则前台收款单审核后会自动生成标准收款单。</p> <p>前台收款单，当结算方式栏的实收金额为空或为0时，前台收款单审核时不会自动也无需生成收款单。</p> <p>前台收款单自动生成的收款单，是按结算方式栏中的行数生成收款单的，每一行一个单据。而前台收款单对上游单据的反写是通过收款内容栏中的数据进行反写的。而收款内容栏与结算方式栏的内容并不是一一对应的，可能一对多、多对一，也可能出现多对多。如多对多，就会拆分生成收款单。比如收款内容中数据为70、30，而结算方式为50、50，则拆分时可能拆分成50、20、30或50、50。因此您可能会看到收款单的明细与前台收款单的收款内容明细对不上的问题。特别是不同上游单据一起被拉到同一前台收款单上，此时如被拆分可能导致收款单上的数据不准确，进而影响记账。因此，请不要对不同单据用同一前台收款单收款，即使实际是收在同一笔款项下。但可以不同的（前台）收款单合并生成凭证，确保凭证上的现金类科目与实际一致。</p> <h3 id="_3-3-业务发生的登记过程-应收单-对账科目-统称-在借方"><a href="#_3-3-业务发生的登记过程-应收单-对账科目-统称-在借方" class="header-anchor">#</a> 3.3 业务发生的登记过程-应收单（对账科目（统称）在借方）</h3> <p>对账科目（统称）各明细科目，为受控科目。禁止编制手工凭证登记业务的发生。</p> <p><strong>1.因销售商品、产品、提供劳务等业务，需要向购买单位确认债权时，即可业务单据关联生成应收单</strong>。借记<code>对账科目（统称）</code>科目。</p> <p>应收单核心是确认债权。严格意义上，与实际是否开票没有必然关系。当然，在实务操作中，为了减少核对，减轻处理税务的难度，一般来说，应收单和实际开票会要求同步。</p> <p>也即开了发票，如果不是补开发票，则业务单据就要及时关联生成应收单；</p> <p>如果是补开发票，即之前已推应收单并做无票收入，则补开的不再重新确认债权和收入，做手工凭证，从无票税额科目调整到对应的税额科目；</p> <p>如果需要确认债权，但不开纸质/电子发票，则为无票债权、无票收入， 和开发票的要求一致，仅是生成凭证时，其税项科目为无票税项科目。</p> <p><strong>2.如有退票，则做应收单的负数，而非正数，更不是应付单、手工凭证。</strong></p> <p>退票时，需要从最上游的订单起进行销退类操作，并往下走各业务的退货流程。由于本章节主要目的并不是描述销售退货流程，因此相关业务的退货流程请参见对应业务的退货流程。</p> <p><strong>3.应收单，一般由上游业务单据关联生成，即核心单据类型不为空</strong>。如为空（除特定业务外，如我方开票的整车返利），则为手工应收单。手工应收单，如确与已上线业务模块无法可手工，如有关，则是错误的单据。</p> <p><strong><code>手工应收单，将导致与对应业务单据无关联，无法反写对应业务单据，随即导致单据未结出现异常</code></strong>。</p> <p>整车销售订单和整车调拨的应收单，单据类型为销售发票，分录为物料。</p> <p>其他为销售费用发票/其他应收单/应收借贷项调整单，分录为费用项目。</p> <details class="custom-block details"><summary>应收单核心单据类型与业务的匹配关系</summary> <p>有核心单据类型（源单类型） 的主要场景有：</p> <ul><li>整车销售：核心单据类型为<code>整车销售订单</code>，正数由整车销售订单生成，负数由整车销售出库单生成；</li> <li>整车调拨：核心单据类型为<code>整车调拨单</code>，正数由整车调拨单生成，负数由整车销售出库单生成；</li> <li>二手车销售：核心单据类型为<code>二手车销售单</code>，一般不允许退，正数为二手车销售为正利润，负数为二手车销售为负利润，均由二手车销售单生成；单据类型为销售费用发票</li> <li>精品配件销售：核心单据类型为<code>精品配件销售单</code>，正负应收单，均由精品销售单生成，生成应收单之前，必须精品配件销售单完全出/退库（即未出库数量为0）；如果销售赠送，则需要推零结应收单。</li> <li>代办服务单：核心单据类型为<code>代办服务单</code>，正负应收单，均由代办服务单生成，生成应收单之前，必须先收齐款项；</li> <li>维修业务：核心单据类型为<code>维修结算单</code>，正数应收单由正数的维修结算单生成，负数必须由原工单发起工单退货流程，由负数结算单生成负数应收单；</li> <li>预收款账户，不直接生成应收单，其款项在业务流转中由相关业务单据生成；</li> <li>会员套餐销售，不直接生成应收单，其在维修业务中使用后由维修结算单生成；</li> <li>会员充值的收款，不直接生成应收单，其款项在业务流转中由相关业务单据生成；</li> <li>会员充值的退款，与应收单无关；</li> <li>会员套餐调整，与应收单无关；</li> <li>会员套餐变更，与应收单无关；</li> <li>延保销售：核心单据类型为<code>延保销售单</code>，如延保销售是通过代办服务单简单流转，则核心单据类型为代办服务单；</li> <li>商业产品：核心单据类型为<code>商业产品销售单</code>，正负均由商业产品销售单生成；</li> <li>保险返利：核心单据类型为<code>车辆保险登记单</code>，正负均由车辆保险登记单生成，一般没有负数；</li> <li>按揭返利：核心单据类型为<code>车辆按揭返利单</code>，正负均由车辆按揭返利单生成，一般没有负数。</li></ul> <p>无核心单据类型（源单类型）的主要场景有：</p> <ul><li><p>整车返利（特指由我方向厂家开具发票的业务），手工应收，核心单据类型为空；</p> <p>由厂家给我们开红字发票的，为应付系统业务。</p></li> <li><p>早期的保险返利，手工应收，核心单据类型为空；</p></li> <li><p>早期的按揭返利，手工应收，核心单据类型为空；</p></li> <li><p>其他业务，手工应收单，核心单据类型为空。</p></li></ul></details> <p><strong>3.不管正负应收单，同一类业务，其生成凭证时格式应该一致</strong>，主要格式参考如下：</p> <details class="custom-block details"><summary>应收单常见凭证取值参考</summary> <ul><li>格式一：整车销售（单据类型：销售发票，核心单据为整车销售订单或整车调拨单，分录为物料）</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p><strong>借</strong>：记账分类（表头往来户）中记账要素（2003预收账款/合同负债-整车）关联的科目</p> <p><strong>贷</strong>：记账分类（表头往来户）中记账要素（1002销售收入科目）关联的科目</p> <p><strong>贷</strong>：结合税率、开票类型，带记账分类（客户）中记账要素（2221开头的对应的）关联的科目</p></div> <ul><li>格式二：费用项目类应收单（单据类型：销售费用发票，核心单据与上游业务对应，分录为费用项目）</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p>业务种类繁多，由分录中的费用项目决定对应的往来、收入的记账要素是什么</p> <p><strong>借</strong>：记账分类（表头往来户）中记账要素（与业务对应的预收账款/合同负债类）关联的科目</p> <p><strong>贷</strong>：记账分类（表头往来户）中记账要素（与业务对应的收入类）关联的科目</p> <p><strong>贷</strong>：结合税率、开票类型，带记账分类（表头往来户）中记账要素（2221开头的对应的）关联的科目</p></div> <ul><li>格式三：债权转移类（特定门店使用，非本部同意的门店不得使用，标记为勾选了债权转移）</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p><strong>借</strong>：记账分类（表头往来户）中记账要素（与业务对应的预收账款/合同负债类）关联的科目</p> <p><strong>贷</strong>：记账分类（分录源往来户）中记账要素（与业务对应的预收账款/合同负债类）关联的科目</p></div> <ul><li>格式四：预存款开票（费用项目为<code>预存款开票</code>）</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p>新的合同负债预存款开票</p> <p><strong>贷</strong>：记账要素（表头往来户）中记账要素（2911预存款开票）关联的科目，为负数</p> <p><strong>贷</strong>：记账分类（表头往来户）中记账要素（与业务对应的收入类）关联的科目，为正数</p></div> <ul><li>格式五：手工正负应收单，调整对账科目（统称）科目（及其辅助）</li></ul> <div class="custom-block tip"><p class="custom-block-title">凭证参考</p> <p><strong>借</strong>：分录的应收科目</p> <p><strong>借</strong>：分录的应收科目</p></div></details> <p><strong>4.应收单上的往来类型一般为<code>客户</code></strong>。仅当上游业务为索赔维修时，则往来户类型为<code>供应商</code>。</p> <p><strong>5.应收单上以<code>已结算金额</code>、<code>未结算金额</code>标记应收单的结算结果。</strong></p> <p>已结算金额，表示该应收单与对应的收款单进行了销售回款结算，即这笔发票的钱已经收到；</p> <p>未结算金额，表示该发票到后，还没有对应的收款来与之结算。</p> <p>如果是近期，该往来户也确实挂账了，该往来户合计的未结算金额与财务科目余额能核对上，则为正常。如果是较长时间（超过60天，一般实际不应该超过），即使单据上的未结算金额与财务科目余额能核对上，也应当自我提醒该笔业务是否异常。如果财务余额与单据明细未结算金额合计对不上，则说明有问题，需要及时纠正。</p> <div class="custom-block warning"><p class="custom-block-title">结算处理的注意事项</p> <p>明细内容，请参见本章节前述&lt;2.2&gt;中的第5点。</p></div> <p><strong>6.一般来说，同一往来户，不应同时有应收单未结算、收款单未结算</strong>。如同时有，请核对实际业务是不是确有此区分（比如同时整车贷款已开票未回款、精品销售已预收未开票等等场景）。</p> <p>如财务科目余额没有区分但应收单、收款单均有未结算，则可能是没有及时结算，请及时结算。</p> <p>如财务科目余额确实有区分，但应收单、收款单只有一种单据有未结算，则可能结算错了。</p> <div class="custom-block warning"><p class="custom-block-title">注意</p> <ul><li>一般来说，对账科目（统称）的科目余额，应当等于同往来户对应业务的<code>应收单的未结算金额</code>和<code>收款单的未结算金额</code>之间的<code>差额</code>。</li> <li>应收单的未结算金额  -  收款单的未结算金额  &gt;0 ，则 对账科目（统称）的科目余额一般在借方</li> <li>应收单的未结算金额  -  收款单的未结算金额  &lt;0 ，则 对账科目（统称）的科目余额一般在贷方</li> <li>索赔业务核对时，单据中的往来户需要核查对应的供应商。</li> <li>代办业务、二手车业务等涉及到付款时，需要同步核查对应的付款单。</li></ul></div> <p><strong>7.业务应收</strong>，精品配件销售业务、维修业务，系统以应收单为确认收入的口径、结转成本的依据，因此当精品配件销售单、维修工单为纯赠送类时，如果不推应收单，将导致其成本不知何时结转，或结转口径太多、因素太多，导致无所适从，因此这类纯赠送类业务，需要生成零结的应收单，便于确定结转成本的时点。</p> <p><code>特别强调，任何非纯赠送类业务，不得生成业务应收</code>。</p> <p><strong>8.应收单上的金额与税额必须与实际发票一致</strong>。虽然收入科目（对应应收单的金额）、税金科目（对应应收单的金额）不是受控科目，但我们在统计数据时，是依据单据来统计收入的的，因此当单据上的金额、税额与实际发票有差异时，应当在应收单上先调整好再生成凭证。而不是生成凭证后，在凭证上改却不管单据上的数据，这样导致财务与业务数据不一致，增加不必要的核查工作。同时，需确保应收金额与实际发票的价税合计一致。</p> <h2 id="_4-应收系统的结算处理"><a href="#_4-应收系统的结算处理" class="header-anchor">#</a> 4.应收系统的结算处理</h2> <p>业务发生后，应当及时核查同一业务的应收单、收款单，并及时进行结算处理。代办业务、二手车业务，可能还涉及到付款单。</p> <h3 id="_4-1-结算处理的基本操作"><a href="#_4-1-结算处理的基本操作" class="header-anchor">#</a> 4.1 结算处理的基本操作</h3> <ul><li><p><strong>操作角色</strong>：<code>整车会计</code> 或 <code>售后会计</code></p></li> <li><p><strong>操作生成路径</strong>：<code>〖财务会计〗-〖应付管理〗-〖结算处理〗-〖采购付款结算〗</code></p></li> <li><p><strong>查询维护路径</strong>：<code>〖财务会计〗-〖应付管理〗-〖结算处理〗-〖结算记录〗</code></p></li> <li><p><strong>转换规则</strong>：不涉及</p></li> <li><p><strong>操作概要</strong>：</p> <p>一般来说，由同一核心单据生成的应付单、付款单会自动结算，如不是同一核心单据生成一般不应该相互结算；同时，如果其中一方单据核心单据类型为空，则无法自动结算，需要手工结算。手工结算操作参考如下。</p> <ul><li><p>双击 〖采购付款结算〗 ，弹出「结算处理-条件查询」对话窗口，单据日期范围要包含应付单的单据日期、付款单的单据日期。</p></li> <li><p>主对账方过滤：指的是应付单上的往来户，<code>往来户类型</code>一般选择<code>供应商</code>（部分业务需要选择客户，请根据实际业务），<code>往来户从</code>和<code>往来户至</code>均选择要结算的应付单上的<code>往来户</code>。</p></li> <li><p>辅对账方过滤：指的是付款单上的往来户，<code>往来户类型</code>一般选择<code>供应商</code>（部分业务需要选择客户，请根据实际业务），<code>往来户从</code>和<code>往来户至</code>均选择要结算的付款单上的往来户。应当与主对账方一致。</p></li> <li><p>主辅对账方的往来户类型，应该同步，即要么同时是供应商，要么同时是客户。<code>如果要结算不一致的，则应马上自我提醒，这是错误的操作</code>。</p></li> <li><p>其他不用填列，单击【确定】，即进入结算处理的操作界面。上部分为主对账方（即应付单），下部分为辅对账方（即付款单）。</p></li> <li><p>匹配方案选择<code>按往来户相同结算</code>。</p></li> <li><p>结算日期，按需选择，一般不应小于付款单和应付单上的单据日期。</p></li> <li><p>如果是整车、精品配件的应付单、付款单进行结算，由于行数比较多，可以先<code>全选</code>，再把不需要参与结算的行的勾选去掉，再单击工具栏中的【自动结算】，系统会自动留下未结算的单据。</p> <div class="custom-block warning"><p class="custom-block-title">提醒</p> <p>由于在结算处理时，并不按业务进行过滤，因此当同一供应商既有整车业务，又有精品配件业务时，要注意行的勾选，不建议整车应付与精品配件付款、或精品配件应付与整车付款，进行结算处理。</p></div></li> <li><p>如果是整车、精品配件业务以外的业务，进行采购付款结算，则手工勾选需要结算的行，并修改好该行的<code>本次结算原币金额</code>，并确保主对账方和辅对账方的结算原币合计上下相等，然后单击工具栏中的【手工结算】，完成结算处理的操作。</p></li> <li><p>可以单击【本次结算记录查询】，查询本次结算记录。</p></li></ul></li> <li><p><strong>注意事项</strong>：</p> <ul><li>结算处理操作完成后，会更新付款单和应付单上的<code>已结算金额</code>、<code>未结算金额</code>、<code>已锁定金额</code>、<code>未锁定金额</code>。</li> <li>结算记录的往来户应当一致，结算类型为<code>采购付款结算</code>。</li> <li>一般来说，不应该出现结算类型为<code>采购付款转销</code>（即主对账方与辅对账方往来户不一致）。</li> <li>由于本次结算处理为采购付款结算，且结算类型为采购付款结算，因此不需要生成凭证。</li> <li>如果发现结算错误，应及时反结算，如应付系统当前期间在结算期间之后，则无法反结算，本部也无法处理。如确要反结算，则需要总账反结账、应付系统反结账。</li></ul></li></ul> <h3 id="_4-2-结算处理后的预期结果"><a href="#_4-2-结算处理后的预期结果" class="header-anchor">#</a> 4.2 结算处理后的预期结果</h3> <p><code>应付单的未结算金额</code>和<code>付款单的未结算金额</code>之间的<code>差额</code>，一般应等于同往来户的 <code>预付账款</code> 科目的余额。</p> <ul><li>付款单的未结算金额  -  应付单的未结算金额  &gt;0 ，则 预付账款的科目余额一般在借方</li> <li>付款单的未结算金额  -  应付单的未结算金额  &lt;0 ，则 预付账款的科目余额一般在贷方</li></ul> <h2 id="_5-常见错误操作及相应的处理方法"><a href="#_5-常见错误操作及相应的处理方法" class="header-anchor">#</a> 5. 常见错误操作及相应的处理方法</h2> <p>应付单、付款单在维护、生成凭证、结算处理时，以下的操作是错误的，请按照此原则进行处理：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>。常见错误包含但不限于以下列举。</p> <h3 id="_5-1-应付单的单据日期和业务日期不一致"><a href="#_5-1-应付单的单据日期和业务日期不一致" class="header-anchor">#</a> 5.1 应付单的单据日期和业务日期不一致</h3> <p>整车采购核销、精品配件采购核销时，由差异自动生成的成本调整单，其调整日期取值应付单上的业务日期。但实际上应付单生成凭证时，是按单据日期记账的，因此为确保业务匹配对应，要求应付单的单据日期和业务日期保持一致。财务人员在审核应付单时，应当予以注意。</p> <p>为防范此问题，财务人员可以在应付单序时簿，<code>以单据日期按月查询</code>所有的应付单，查询出来所有单据后（注意最大返回结果数要选择全部），然后按业务日期进行排序（双击业务日期字段），看看是不是有不属于该月的业务日期出现，如有，及时进行修改。</p> <p>此问题，如果存在，则会<code>导致整车存货对账、精品配件存货对账出现差异</code>。</p> <p>此问题，当期发现时，应及时反审核应付单，进行修改。如跨期，则无法修正，只能接受至少两期存货对账会出现差异（两期差异加起来为0）。</p> <h3 id="_5-2-应付单和付款单生成凭证时-单据日期和记账日期不在同一期间"><a href="#_5-2-应付单和付款单生成凭证时-单据日期和记账日期不在同一期间" class="header-anchor">#</a> 5.2 应付单和付款单生成凭证时，单据日期和记账日期不在同一期间</h3> <p>应付单、付款单、结算记录生成凭证时，凭证上的记账日期要求与应付单上的单据日期、付款单的单据日期、结算记录的结算期间在同一期间。</p> <p>为防范此问题，如批量生成凭证时，查询条件中，单据日期的范围应当在一个自然月度内，不要跨期查询，否则就可以误选，导致生成凭证不在同一期间。</p> <p>此问题，如果存在，则会<code>导致应付管理系统期末对账出现差异</code>。还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>此问题，当期发现时，应及时反审核，进行修改。如跨期，则无法修正。只能接受至少两期的差异。</p> <h3 id="_5-3-应付单生成凭证时-预付科目错在借方"><a href="#_5-3-应付单生成凭证时-预付科目错在借方" class="header-anchor">#</a> 5.3 应付单生成凭证时，预付科目错在借方</h3> <p>应付单生成凭证时，预付账款科目应当在贷方，却错在借方；甚至出现借方贷方同时有预付账款科目。</p> <p>此问题，一般出在调账类的应付单，或手工应付单上，或人为错误操作。如：</p> <ul><li>在生成凭证时，人为把本来在贷方的预付账款科目，手工错误移到借方。</li> <li>在应付单分录的对方科目填上了预付账款科目，在生成凭证时（规则为借分录的对方科目，贷分录的应付科目），这样就出现了错误。</li></ul> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、可能进行错误的结算处理、还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>此问题，发现后，要求尽快修正。如果是当期的，建议删除凭证，反审核应付单，修正应付单上的错误后，按规范重新生成凭证。</p> <p>如果不好直接修正原错误，或已经跨期，则应当按调整原则进行调整：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>。</p> <h3 id="_5-4-付款单生成凭证时-预付科目错在贷方"><a href="#_5-4-付款单生成凭证时-预付科目错在贷方" class="header-anchor">#</a> 5.4 付款单生成凭证时，预付科目错在贷方</h3> <p>付款单生成凭证时，预付账款科目应当在借方，却错在贷方；甚至出现借方贷方同时有预付账款科目。</p> <p>此问题，一般原因有：</p> <ul><li>在生成凭证时，人为把本来在借方的预付账款科目，手工错误移到贷方。</li> <li>在付款单分录的付款科目填上了预付账款科目（应该只选填现金类科目），在生成凭证时（规则为借分录的对方科目，贷付款科目），这样就出现了错误。</li></ul> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、可能进行错误的结算处理、还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>此问题，发现后，要求尽快修正。如果是当期的，建议删除凭证，反审核付款单，修正付款单上的错误后，按规范重新生成凭证。</p> <p>如果不好直接修正原错误，或已经跨期，则应当按调整原则进行调整：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>。</p> <h3 id="_5-5-单据生成凭证时-单据上的应付金额与凭证上的金额不相等"><a href="#_5-5-单据生成凭证时-单据上的应付金额与凭证上的金额不相等" class="header-anchor">#</a> 5.5 单据生成凭证时，单据上的应付金额与凭证上的金额不相等</h3> <p>应付单生成凭证时，凭证上的预付账款科目的金额应当等于应付单分录中的应付金额的合计。</p> <p>付款单生成凭证时，凭证上的预付账款科目的金额应当等于付款单分录中的应付金额的合计。</p> <p>此问题，肯定是人为修改了凭证分录或辅助账行上的金额，或修改或删除了凭证上的辅助行上的数据。</p> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、可能进行错误的结算处理、还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>此问题，发现后，要求尽快修正。如果是当期的，建议删除凭证，反审核单据，修正单据上的错误后，按规范重新生成凭证。</p> <p>如果不好直接修正原错误，或已经跨期，则应当按调整原则进行调整：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>。</p> <p>另外，应付单生成凭证时，金额字段与凭证上的材料采购（费用、成本等）的金额应该一致；税额字段与凭证上的应交进项税的金额应该一致。</p> <h3 id="_5-6-单据生成凭证时-凭证上的往来户与单据不一致"><a href="#_5-6-单据生成凭证时-凭证上的往来户与单据不一致" class="header-anchor">#</a> 5.6 单据生成凭证时，凭证上的往来户与单据不一致</h3> <p>应付单生成凭证时，凭证上辅助账行的往来户应当与应付单上的往来户一致。</p> <p>付款单生成凭证时，凭证上辅助账行的往来户应当与付款单上的往来户一致。</p> <p>此问题，肯定是人为修改了凭证辅助账行的往来户。</p> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、可能进行错误的结算处理、还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>此问题，发现后，要求尽快修正。如果是当期的，建议删除凭证，按规范重新生成凭证。如果是单据上的往来户就错了，那还需要反审核应付单（甚至更上游的业务单据）。</p> <p>如果不好直接修正原错误，或已经跨期，则应当按调整原则进行调整：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>。</p> <h3 id="_5-7-应付单勾选了业务应付"><a href="#_5-7-应付单勾选了业务应付" class="header-anchor">#</a> 5.7 应付单勾选了业务应付</h3> <p>应付单支持业务应付的功能，但我们的应用中，不存在应付单需要业务应付的对应场景。因此，如果应付单勾选了业务应付，肯定是错误的操作。</p> <p>此问题，肯定是人为勾选了业务应付字段。</p> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、可能进行错误的结算处理、无法与采购入库单进行采购核销，还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>如果应付单勾选了业务应付，则需要反结账到该应付单所在期间，反审核应付单，并删除。</p> <p>如果应付单勾选了业务应付，而且业务应付的应付单还生成了凭证，这个问题就更严重，需要反结账到该应付单所在期间，反审核应付单，并删除，重新由上游单据生成应付单，再重新生成凭证。</p> <p>该错误，不好用调整原则进行调整，需要反结账操作，因此财务人员在审核应付单时要特别注意。</p> <h3 id="_5-8-结算记录生成凭证时-借贷方与原单据不一致"><a href="#_5-8-结算记录生成凭证时-借贷方与原单据不一致" class="header-anchor">#</a> 5.8 结算记录生成凭证时，借贷方与原单据不一致</h3> <p>涉及预付科目的往来单据，结算处理时，结算记录的结算类型应当为<code>采购付款结算</code>，因此不需要生成凭证。</p> <p>但在实际业务过程中，可能有时错误结算，或往来户串户等，导致把往来户不一致的单据进行了结算，此时，结算记录需要生成凭证。</p> <p>不管哪种需要生成凭证的结算记录，在生成凭证时，其基本的原则是：</p> <ul><li><p>先明确结算记录是哪类单据和哪类单据进行结算，常用的结算类型：</p> <ul><li><p><code>应付单和付款单结算（采购付款结算、采购付款转销）</code>， 一般往来户不一致的转销很少有</p></li> <li><p><code>应收单和收款单结算（销售回款结算、销售回款转销）</code>，一般往来户不一致的转销发生在整车开票与收款不一致、二手车收款抵新车等场景</p></li> <li><p><code>收款单和付款单结算（预收冲预付结算、预收冲预付转销）</code>，业务一般为代收与代付的业务、二手车收款与二手车付款的业务</p></li></ul></li> <li><p>我们不用的结算类型：</p> <ul><li><p><code>代收单（收款类型为代收款）和代付单（付款类型为代付款）（结算收款冲付款结算、收款冲付款转销）</code>，该业务场景现在已停止应用，通过代收款（新）和代付款（新）转到了预收冲预付的操作中</p></li> <li><p><code>应收单和应付单结算</code>，虽然系统支持，但因为涉及到业务单据的反写、流程规范等，因此我们不用此功能</p></li> <li><p><code>付款单与收款单结算</code>，预付冲预收结算、预付冲预收转销，此结算处理和预收冲预付实际是一回事，为减少操作困惑，不使用此功能</p></li> <li><p><code>代付单与代收单结算</code>，此结算处理和代收冲代付实际是一回事，为减少操作困惑，不使用此功能</p></li> <li><p><code>应付单与应收单结算</code>，此结算处理和应收冲应付实际是一回事，为减少操作困惑，不使用此功能</p></li></ul></li> <li><p>上述结算类型，只有两类不需要生成凭证，其它结算类型均需要生成凭证</p> <ul><li>应收单和收款单结算且往来户一致一致（即销售回款结算）不需要生成凭证，如往来户不一致（即销售回款转销）需要生成凭证</li> <li>应付单和付款单结算且往来户一致一致（即采购付款结算）不需要生成凭证，如往来户不一致（即采购付款转销）需要生成凭证</li> <li>其它结算类型均需要生成凭证</li></ul></li> <li><p>结算记录生成凭证时，其生成凭证的基本逻辑：</p> <ul><li><strong>凭证上的科目、往来户、金额，应该和原始单据一致。如应收单和收款单结算，则生成凭证时：借方与原收款单的科目、辅助、金额一致，贷方与原应收单的科目、辅助、金额一致</strong>。</li> <li><strong>方向，应该与原始单据相反方向。如应收单和收款单结算，则生成凭证时：借方为原收款单的科目、辅助、金额（而不是应收单），贷方与原应收单的科目、辅助、金额一致（而不是收款单）</strong>。</li> <li><strong>记账日期，应与结算记录的结算期间在同一期间</strong>。</li></ul></li></ul> <p>如果上述的规范，不被遵循，可能会影响应收管理系统、应付管理系统的对账（对账不平，也是财务记账不规范的结果体现），财务数据错乱，该结算的无法结算。</p> <p>当期发现后，要及时进行处理，删除凭证，反结算，再按正确的流程、业务匹配关系进行结算（并生成凭证（如需））。</p> <p>如果跨期才发现，处理起来非常麻烦，需要参照已结算的原始单据，两边同时做正负金额的单据，然后相反金额的单据按原错误的方式进行结算（并生成凭证（如需））；再相同金额的单据按正确方式进行结算（并生成凭证（如需））。比如应付单和付款单结算错了或虽然结算正确但生成凭证不正确，则需要做正负应付单、正负付款单，单据需要生成凭证、结算记录要错误结算（相反金额单据按原错误方式操作）（并生成凭证（如需））、结算记录要正确结算（并生成凭证（如需））。</p> <h3 id="_5-9-结算类型错误-常被忽略-请特别注意"><a href="#_5-9-结算类型错误-常被忽略-请特别注意" class="header-anchor">#</a> 5.9 结算类型错误（常被忽略，请特别注意）</h3> <p>这类错误，严格意义上，是系统的错误。当往来户不一致时，结算记录的结算类型应该为转销。但在以下场景下，可能会出现错误：</p> <ul><li>结算记录上的往来户，即有相同的又有不相同的，如往来户A的应收单同时和往来户A的收款单、往来户B的收款单进行结算，此时该结算类型正确应该为销售回款转销，但却错误为销售回款结算，导致结算记录不需要生成凭证，进而导致财务账错误。该场景，常出现在整车销售换开票抬头的业务中，请特别注意。</li> <li>再如往来户A的应付单同时和往来户A的付款单、往来户的付款单进行结算，此时该结算类型正确应该为采购付款转销，但却错误为采购付款结算，导致结算记录不需要生成凭证，进而导致财务错误。该场景，可能出现在供应商串户（或更名后，在过渡期间又另起一供应商流转业务）的业务中，请特别注意。</li></ul> <p>此问题，比较严重，会导致财务科目余额涉及的往来户分别挂借贷余额，无法抵消。</p> <p>该错误发现后，应及时进行反结算，并重新分别手工结算（A对A结算、A对B结算，而不是A对A、B同时结算）。如果跨期了，需要反结账到相应期间，进行反结算，再结回到本期，重新结算，并对转销的结算记录生成凭证。</p> <h3 id="_5-10-手工凭证上有预付科目"><a href="#_5-10-手工凭证上有预付科目" class="header-anchor">#</a> 5.10 手工凭证上有预付科目</h3> <p>这类错误，常发生于刚开始使用新的受控科目，然后又没有把预付账款科目加到应付管理的对账科目中，同时参数又没有启用校验。</p> <p>此问题，比较严重，操作起来比较麻烦。</p> <p>该错误的修正方法思路为：</p> <ul><li>把对账科目删除（需要本部操作）；</li> <li>在本期冲销手工的凭证；</li> <li>反结账到该科目第一次使用的期间，增加对账科目；结账回到本期；</li> <li>根据凭证记录的实际业务，手工编制对应的往来单据（应收、收款、应付、付款），再由单据生成凭证。</li></ul> <p>为规避该问题，在第一次使用该科目时，需要做如下操作：</p> <ul><li>检查对账科目是否加入该科目；</li> <li>检查系统参数是否允许修改受控科目的分录（要求参数为不允许）；</li> <li>从第一次使用该科目的月份起，对该科目进行期末对账，对账不平的，请当期就检查并修正错误直至对账一致。</li></ul> <h3 id="_5-11-应付单、付款单未生成凭证"><a href="#_5-11-应付单、付款单未生成凭证" class="header-anchor">#</a> 5.11 应付单、付款单未生成凭证</h3> <p>该类错误，一般发生于早期操作，或因网络原因单据看似已经生成凭证，但实际未生成凭证。</p> <p>此问题，比较严重，如果存在，会导致应付管理系统期末对账不平、还原后的 付款单的未结算金额 减去 应付单的未结算金额 的差额，<code>不会等于科目余额</code>，进而也会影响<code>超期预付账款分析表</code>的正确性。</p> <p>该错误的修正方法思路为：</p> <ul><li>修正错误的记账标记（反馈给本部操作）；</li> <li>临时放开规则，允许跨期生成凭证；</li> <li>补生成凭证至本期（一定不是原单据对应的期间）。</li></ul> <p><strong>以上种种错误，会导致，同时也是不规范的数据或操作的结果体现</strong>：</p> <ul><li><p>期末对账不平</p></li> <li><p>无法正确核销</p></li> <li><p>无法正确结算</p></li> <li><p>未结算金额的合计相互抵减后，不等于财务科目的余额</p></li> <li><p>财务数据混乱</p> <p>等等。</p></li></ul> <h2 id="_6-预付账款未结算单据的特殊业务"><a href="#_6-预付账款未结算单据的特殊业务" class="header-anchor">#</a> 6. 预付账款未结算单据的特殊业务</h2> <p>业务均正常、生成凭证也规范，但科目余额方向与未结算单据不匹配对应，应付单和付款单都有未结算金额，但无法结算。</p> <p>一般表现为：</p> <ul><li>较常发生：付款单没有未结算金额，但预付账款的余额在借方；进而导致超期预付分析表中，没有付款单明细匹配。</li> <li>较少发生：应付单没有未结算金额，但预付账款的余额在贷方。</li></ul> <p>此业务，常由大量的负数单据（比如返利的红字应付单、索赔转预付的红字应付单）引起，同时由于结算处理的不规范，付款单已经没有了未结算金额，即全部都已结算，但应付单有大量的负数行未结算，预付账款的科目余额在借方。</p> <p>处理此问题的方法思路参考为：</p> <ul><li><p>同步做正负的付款单，这两个单据合并生成凭证后，为0，即正负付款单不影响财务发生额、余额，也不影响业务余额、发生额。</p> <p>凭证参考为：借：预付  正，借：预付  负。</p></li> <li><p>负的付款单，与负数的应付单进行手工结算。</p></li> <li><p>正的付款单，其未结算金额，留待与后续发生的应付单进行正常结算。</p></li> <li><p>正的付款单，其未结算金额，一般也会等于预付账款科目的借方余额。</p></li></ul> <p>同时，还有一些业务，可能也会表现类似如上特征：</p> <ul><li>二手车收购业务中，特别是单独收购，收购车后客户就要求及时付款，而此付款单，如果门店以预付账款挂往来，则在超期预付账款分析表中，会出现没有付款单明细匹配的记录（因为单据上往来户是客户）。</li></ul> <div class="custom-block danger"><p class="custom-block-title">特别提醒</p> <p>有未结算金额，但无法结算的可能场景：</p> <ul><li><p>同一来源的应付单、付款单都有未结算金额，需要结算时，却无法结算。这个主要原因是拟结算的金额已被占用锁定，表现为已锁定金额字段有值，未结算金额无值，或已锁定金额字段值不等于已结算金额字段值。</p> <p>解决办法：在对应的付款单序时簿界面（列表界面）或打开单据进入单据界面，点击工具栏中的【结算】，则会把锁定占用的金额进行真正结算，转到已结算金额中。操作完成后，应付单、付款单这两个单据的已锁定金额都会转到已结算。</p></li> <li><p>应收单和收款单，也有类似的特性，如果也出现未结算金额字段有值，已锁定金额也有值，且已锁定金额不等于已结算金额，则可以通过收款单的列表界面或单据界面，单击【结算】，完成真正的结算，把未结算金额转到已结算金额。</p></li> <li><p>应付单、付款单的付款方式不一致，要求付款方式都为<code>赊购</code>。应收单、收款单的付款方式不一致，要求付款方式都为<code>赊销</code>。如果不一致，且会导致无法结算。</p></li></ul></div> <h2 id="_7-超期预付账款分析表"><a href="#_7-超期预付账款分析表" class="header-anchor">#</a> 7. 超期预付账款分析表</h2> <p>该报表的取值逻辑，简要概述如下：</p> <p>逐级往下找数据：</p> <ol><li>取所有预付账款辅助有余额的明细；</li> <li>按二级科目+供应商辅助，进行余额汇总合并；</li> <li>合并后的金额，其余额在借方的，视为预付账款；</li> <li>合并后的金额，其余额在贷方的，视为应付账款；</li> <li>视为预付账款的余额及往来户，在该报表中展现；</li> <li>取该往来户的应付单的未结算金额合计，列示在报表上；</li> <li>取该往来户的付款单的未结算金额不为0的明细，列示在报表上。</li></ol> <p>原则上，要求左侧的财务科目余额，应该与右侧的付款单明细的合计相等，但如因为操作不规范，或负数应付单引起、该结算的没有及时结算等原因，就会导致不相等。因此，门店在期末结账前，必须查询本报表，如有不相等的，请参照本章节描述的各个环节进行检查，并及时进行操作处理，如出现错误的需要及时修正。</p> <div class="custom-block warning"><p class="custom-block-title">提醒</p> <ul><li>如果查询当期数据，可能因单据没有生成凭证，导致左侧余额和右侧明细对不上。因此，如要查询当期，请务必对涉及预付账款科目的已审核（已付款）的单据（应付单、付款单、需要生成凭证的结算记录等）及时生成凭证。</li></ul></div> <p><strong>当查询期间的最后一天与单据的归属日期（如业务日期、单据日期）之间相差的天数，大于该业务类型的参考账期时，则会被标记为红色，视为超期。</strong></p> <p>**参考账期一般设置为60天。**请予以关注，为什么已付款，但还没有采购发票来？是结算错了，还是根据合同约定，就是预付账款的时间特别早？</p> <h2 id="_8-核查预付账款的基本思路"><a href="#_8-核查预付账款的基本思路" class="header-anchor">#</a> 8. 核查预付账款的基本思路</h2> <p>当预付账款，出现记账不规范、期末对账不平、未结算金额不等于科目余额的问题时，可以参考如下思路进行核查。</p> <h3 id="_8-1-日常发生"><a href="#_8-1-日常发生" class="header-anchor">#</a> 8.1 日常发生</h3> <p>基本逻辑：</p> <ul><li>应付单生成凭证，预付科目在贷方</li> <li>付款单生成凭证，预付科目在借方</li> <li>偶有的采购付款转销的结算记录（一般不应该有），与应付单对应的明细行生成凭证时预付科目在借方，与付款单对应的明细行生成凭证时预付科目在贷方</li></ul> <p>操作思路：</p> <ul><li>导出该往来户的所有应付单（查询条件中，默认勾选为<code>显示分录</code>，请务必切换到<code>显示表头</code>），金额类字段以<code>应付金额合计</code>为核对字段，其他字段按需设置是否隐藏；</li> <li>导出该往来户的所有付款单（查询条件中，默认勾选为<code>显示分录</code>，请务必切换到<code>显示表头</code>），金额类字段以实付金额合计为核对字段，其他字段按需设置是否隐藏；</li> <li>导出该往来户，总账系统的预付账款科目的辅助核算明细表；</li> <li>应付单、付款单，与辅助核算明细表进行比对，看看哪笔单据和凭证不匹配对应（即出现前述列举的各种操作错误），并标记不匹配对应的，另建议按不匹配对应进行分类标以不同的颜色，便于处理；</li> <li>按前述罗列的方法，查明错误原因，并按各错误原因的处理思路进行修正；</li> <li>对修正后的数据，再次回头检查同往来户的金额：付款单的未结算金额 减去 应付单的未结算金额 的差额 是否等于预付账款的科目余额；期末对账是否一致等等。</li></ul> <div class="custom-block danger"><p class="custom-block-title">特别提醒</p> <ul><li>所有涉及到新增加凭证的调整，其单据和凭证的期间均应在本期。如错调在发生错误的期间，则会导致财务报表与原已上报的报表不一致，此问题特别严重，请予以特别注意！！！</li> <li>对于不涉及新增加凭证的调整（删除凭证再重新按规范生成一样的凭证，不视为是新增加凭证），可以在发生错误的期间按规范重新操作。</li></ul></div> <h3 id="_8-2-期末对账"><a href="#_8-2-期末对账" class="header-anchor">#</a> 8.2 期末对账</h3> <p>基本逻辑和日常发生一样：</p> <ul><li>应付单生成凭证，预付科目在贷方</li> <li>付款单生成凭证，预付科目在借方</li> <li>偶有的采购付款转销的结算记录（一般不应该有），与应付单对应的明细行生成凭证时预付科目在借方，与付款单对应的明细行生成凭证时预付科目在贷方</li></ul> <p>前提：</p> <ul><li>预付账款科目要加入对账科目</li> <li>加入对账科目的期间开始，才能进行对账</li> <li>如果在期末对账的操作中，选择科目时，选不到要对账的科目，说明该科目在该期没有加入对账科目（一般来说，加入后不删除后续都可以选到，加入后删除后续都无法选到但删除前的期间可以选到）</li></ul> <p>操作思路：</p> <ul><li>从上期开始，逐月倒序，查询期末对账，核查有差异的往来户，是哪个月开始有差异的；再根据差异金额，重点查与该金额相同或相关的应付单、付款单的发生，查看这些单据生成凭证是否规范，肯定有不规范的，如没有相同或相关的金额，则就需要核查该期间该往来户所有的应付单、付款单的发生，确认到底是哪笔出现问题；</li> <li>并再顺序，往后查，各后续月份是否还有其他不规范操作，导致对账有差异的明细；</li> <li>把所有不规范的明细，梳理问题及调整方法，按规范在本期，并按调整总原则：<code>原来如何错误的，则先以同样错误的方式并以相反金额冲掉原来的单据，再按正确的操作补调单据</code>，冲销并调整单据和凭证；</li> <li>在本期进行期末对账（本期如有该往来户的应付单和付款单发生，一定要生成凭证），应该期末金额就没有差异了，如还有差异，则说明调整的不对，请重新核查。</li></ul> <p>以上，经自查并处理后，还是有不对的、有差异，则可联系本部，予以协助核查。</p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E8%B6%85%E6%9C%9F%E5%BA%94%E6%94%B6" title="标签">#超期应收</a><a href="/tags/?tag=%E6%9C%9F%E6%9C%AB%E5%AF%B9%E8%B4%A6" title="标签">#期末对账</a><a href="/tags/?tag=%E9%A2%84%E6%94%B6%E8%B4%A6%E6%AC%BE" title="标签">#预收账款</a><a href="/tags/?tag=%E5%90%88%E5%90%8C%E8%B4%9F%E5%80%BA" title="标签">#合同负债</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/05/19, 23:52:15</span></div></div> <div class="page-n
